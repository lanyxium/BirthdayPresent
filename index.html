<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Rezensionen - Henning inc. : Jan Wittig</title>
  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background-color: #f8f9fa;
      color: #202124;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .review-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 1px 3px rgba(60,64,67,0.12), 0 1px 2px rgba(60,64,67,0.24);
      max-width: 500px;
      width: 100%;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .profile-img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
    }

    .title-area h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.3;
    }

    .title-area p {
      margin: 4px 0 0;
      color: #5f6368;
      font-size: 14px;
    }

    /* Gesamtbewertung */
    .score-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .score {
      font-size: 36px;
      font-weight: 700;
      color: #202124;
    }

    .stars {
      color: #fbbc04;
      font-size: 18px;
    }

    .star-grey {
      color: #dadce0;
    }

    .review-count {
      color: #5f6368;
      font-size: 14px;
    }

    /* Einzelne Rezensionen */
    .review-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .review-item {
      display: flex;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #1a73e8;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      flex-shrink: 0;
    }

    .review-content {
      flex-grow: 1;
    }

    .reviewer-name {
      font-weight: 500;
      font-size: 14px;
      margin: 0;
    }

    .review-meta {
      font-size: 12px;
      color: #70757a;
      margin-top: 2px;
    }

    .review-text {
      font-size: 14px;
      line-height: 1.4;
      margin-top: 8px;
      color: #3c4043;
    }
  </style>
</head>
