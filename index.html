<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Rezensionen - Henning inc. : Jan Wittig</title>
  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background-color: #f8f9fa;
      color: #202124;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .review-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 1px 3px rgba(60,64,67,0.12), 0 1px 2px rgba(60,64,67,0.24);
      max-width: 500px;
      width: 100%;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .profile-img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
    }

    .title-area h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.3;
    }

    .title-area p {
      margin: 4px 0 0;
      color: #5f6368;
      font-size: 14px;
    }

    /* Gesamtbewertung */
    .score-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .score {
      font-size: 36px;
      font-weight: 700;
      color: #202124;
    }

    .stars {
      color: #fbbc04;
      font-size: 18px;
    }

    .star-grey {
      color: #dadce0;
    }

    .review-count {
      color: #5f6368;
      font-size: 14px;
    }

    /* Einzelne Rezensionen */
